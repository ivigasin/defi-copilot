apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: defi-copilot-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: defi-copilot

  source:
    repoURL: "https://github.com/ivigasin/defi-copilot.git"
    targetRevision: main
    path: infra/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: defi-copilot

  # Manual sync — no automated policy
  # Operator triggers sync via Argo CD UI or CLI:
  #   argocd app sync defi-copilot-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

services:
  postgres:
    image: postgres:16-alpine
    container_name: defi-copilot-postgres
    environment:
      POSTGRES_USER: defi
      POSTGRES_PASSWORD: defi_pass
      POSTGRES_DB: defi_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: defi-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

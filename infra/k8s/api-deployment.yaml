apiVersion: apps/v1
kind: Deployment
metadata:
  name: defi-copilot-api
  namespace: defi-copilot
  labels:
    app: defi-copilot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: defi-copilot-api
  template:
    metadata:
      labels:
        app: defi-copilot-api
    spec:
      serviceAccountName: defi-copilot-api
      containers:
        - name: api
          image: registry.digitalocean.com/defi-copilot-registry/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: defi-copilot-config
            - secretRef:
                name: defi-copilot-secrets
          readinessProbe:
            httpGet:
              path: /wallets
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wallets
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

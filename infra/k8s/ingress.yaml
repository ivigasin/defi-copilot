apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: defi-copilot-ingress
  namespace: defi-copilot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.defi-copilot.dev
        - api.defi-copilot.dev
      secretName: defi-copilot-tls
  rules:
    - host: app.defi-copilot.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: defi-copilot-web
                port:
                  number: 3000
    - host: api.defi-copilot.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: defi-copilot-api
                port:
                  number: 4000

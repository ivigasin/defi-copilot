apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: api-require-jwt
  namespace: defi-copilot
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: api-waypoint
  action: ALLOW
  rules:
    # Allow health check probes without JWT
    - to:
        - operation:
            paths: ["/health", "/healthz", "/ready"]
    # Allow requests with valid JWT
    - from:
        - source:
            requestPrincipals: ["*"]

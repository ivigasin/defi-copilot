name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: defi
          POSTGRES_PASSWORD: defi_pass
          POSTGRES_DB: defi_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U defi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://defi:defi_pass@localhost:5432/defi_copilot
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm --filter @defi-copilot/api prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build-images:
    name: Build Images (${{ matrix.app }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [api, web, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.npmrc'
              - 'pnpm-workspace.yaml'

      - name: Build image
        if: steps.filter.outputs.changed == 'true'
        run: |
          BUILD_ARGS=""
          if [ "${{ matrix.app }}" = "web" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_API_URL=https://api.defi.vigasin.com"
          fi
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            $BUILD_ARGS \
            -t defi-copilot/${{ matrix.app }}:${{ github.sha }} \
            .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install chromium

      - name: Run Playwright e2e tests
        working-directory: apps/web
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

name: Build & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: build-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: registry.digitalocean.com/defi-copilot-registry

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        app: [api, web, worker]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Build image
        run: |
          BUILD_ARGS=""
          if [ "${{ matrix.app }}" = "web" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_API_URL=https://api.defi.vigasin.com"
          fi
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            $BUILD_ARGS \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.event.workflow_run.head_sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.event.workflow_run.head_sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:latest

  update-manifests:
    name: Update k8s image tags
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # DEPLOY_TOKEN must be a fine-grained PAT (contents: write) from the repo owner.
          # Repo owner PATs bypass branch protection when enforce_admins=false.
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Pin image tags to deployed SHA
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          sed -i "s|${{ env.REGISTRY }}/api:.*|${{ env.REGISTRY }}/api:${SHA}|g" infra/k8s/api-deployment.yaml
          sed -i "s|${{ env.REGISTRY }}/web:.*|${{ env.REGISTRY }}/web:${SHA}|g" infra/k8s/web-deployment.yaml
          sed -i "s|${{ env.REGISTRY }}/worker:.*|${{ env.REGISTRY }}/worker:${SHA}|g" infra/k8s/worker-deployment.yaml

      - name: Commit and push manifest update
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/api-deployment.yaml infra/k8s/web-deployment.yaml infra/k8s/worker-deployment.yaml
          git diff --cached --quiet && echo "No manifest changes, skipping commit." && exit 0
          git commit -m "chore: deploy ${SHA::7} to staging [skip ci]"
          git push

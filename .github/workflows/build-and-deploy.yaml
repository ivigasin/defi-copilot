name: Build & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: build-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: registry.digitalocean.com/defi-copilot-registry

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        app: [api, web, worker]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.workflow_run.head_sha }}~1
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: |
            changed:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.npmrc'
              - 'pnpm-workspace.yaml'

      - name: Install doctl
        if: steps.filter.outputs.changed == 'true'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        if: steps.filter.outputs.changed == 'true'
        run: doctl registry login --expiry-seconds 600

      - name: Build image
        if: steps.filter.outputs.changed == 'true'
        run: |
          BUILD_ARGS=""
          if [ "${{ matrix.app }}" = "web" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_API_URL=https://api.defi.vigasin.com"
          fi
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            $BUILD_ARGS \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.event.workflow_run.head_sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:latest \
            .

      - name: Push image
        if: steps.filter.outputs.changed == 'true'
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:${{ github.event.workflow_run.head_sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:latest

  rollout:
    name: Rollout to Cluster
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save defi-copilot-staging

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/defi-copilot-api -n defi-copilot
          kubectl rollout restart deployment/defi-copilot-web -n defi-copilot
          kubectl rollout restart deployment/defi-copilot-worker -n defi-copilot

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/defi-copilot-api -n defi-copilot --timeout=120s
          kubectl rollout status deployment/defi-copilot-web -n defi-copilot --timeout=120s
          kubectl rollout status deployment/defi-copilot-worker -n defi-copilot --timeout=120s
